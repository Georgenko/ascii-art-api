<!DOCTYPE html>
<html lang="en">
<head>
    <title>ASCII art API</title>
    <script defer src="/static/js/app.js"></script>
    <script defer src="/static/js/api.js"></script>
    <script defer src="/static/js/fonts.js"></script>
    <script defer src="/static/js/banner.js"></script>
    <script defer src="/static/js/image.js"></script>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<nav>
    <h1>ASCII art API</h1>
    <a onclick="show('text-to-banner')">Text -> Banner</a>
    <a onclick="show('image-to-ascii')">Image -> ASCII</a>
    <a onclick="show('prompt-to-ascii')">Prompt -> ASCII</a>
</nav>
<main>
    <div id="text-to-banner" class="section">
        <h1>Convert text to banner</h1>

        <label for="textarea-banner">Text:</label><br>
        <textarea id="textarea-banner"></textarea><br><br>

        <label for="select-font">Font:</label><br>
        <select id="select-font"></select><br><br>

        <label for="checkbox-cyrillic">Cyrillic:</label>
        <input type="checkbox" id="checkbox-cyrillic" onchange="loadBannerFonts()"><br><br>

        <button onclick="convertTextToBanner()">Convert</button>
    </div>
    <div id="image-to-ascii" class="section">
        <h1>Convert image to ASCII (WIP)</h1>
        <input type="file" accept="image/*"/>
        <button onclick="convertImageToAscii()">Convert</button>
        <p>You can try it out at the <a href="/docs">Swagger</a> or <a href="/redoc">ReDoc</a> docs</p>
    </div>
    <div id="prompt-to-ascii" class="section">
        <h1>Convert prompt to ASCII (WIP)</h1>
        <label for="prompt-textarea">Prompt:</label>
        <textarea id="prompt-textarea"></textarea>
        <button>Generate</button>
        <p>You can try it out at the <a href="/docs">Swagger</a> or <a href="/redoc">ReDoc</a> docs</p>
    </div>
    <div id="result-view">
        <button onclick="show(lastSection)">← Back</button>
        <pre id="result"></pre>
    </div>
</main>
</body>
</html>
